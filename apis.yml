name: Core & Main
x-type: company
description: >-
  Core & Main is a leading specialty distributor of water, wastewater, storm
  drainage, and fire protection products and related services to municipalities,
  contractors, and engineers across the United States. As a Fortune 500 company,
  Core & Main operates more than 320 branch locations and provides products and
  services for water infrastructure, geosynthetics, fusible HDPE pipe, smart
  metering, fire protection, and erosion control.
